name: SIDPlayer
options:
  bundleIdPrefix: com.sidplayer
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "26.4"

packages:
  sidplayer:
    path: .

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  SIDPlayer:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: sidplayer
        product: SIDEngine
      - package: sidplayer
        product: SIDCatalog
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: "SID Player"
        CFBundleName: "SID Player"
        CFBundleIconFile: "AppIcon"
        LSApplicationCategoryType: "public.app-category.music"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        NSPrincipalClass: "NSApplication"
        CFBundleShortVersionString: "0.5"
        CFBundleVersion: "5"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sidplayer.app
        PRODUCT_NAME: "SID Player"
        # Bundling a hand-built AppIcon.icns from App/. actool silently
        # dropped half the sizes from generated .icns files.
        GENERATE_INFOPLIST_FILE: NO
        # Local-dev signing: ad-hoc, no team required.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        # 7z extraction now uses SWCompression (pure-Swift), so no more
        # /usr/bin/tar shell-out, so we can run inside the App Sandbox.
        CODE_SIGN_ENTITLEMENTS: App/SIDPlayer.entitlements
        ENABLE_APP_SANDBOX: YES
